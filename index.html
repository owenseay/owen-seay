<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owen Seay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    color: #1a1a1a;
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* -- top bar -- */
  .top-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 14px 20px;
    background: #1a1a1a;
  }

  .top-bar span {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
  }

  @media (max-width: 500px) {
    .top-bar { gap: 14px; flex-wrap: wrap; justify-content: center; }
    .top-bar span { font-size: 10px; letter-spacing: 1.5px; }
  }

  /* -- hero photo -- */
  .hero {
    width: 100%;
    max-height: 70vh;
    overflow: hidden;
    position: relative;
  }

  .hero img {
    width: 100%;
    height: 130%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
    will-change: transform;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40%;
    background: linear-gradient(transparent, #fff);
    pointer-events: none;
  }

  /* -- thought bubble -- */
  .thought-bubble {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 24px;
    z-index: 1;
    pointer-events: none;
    white-space: nowrap;
  }

  .thought-text {
    font-size: 14px;
    font-weight: 400;
    color: #333;
    letter-spacing: 0.2px;
  }

  .thought-cursor {
    display: inline-block;
    width: 1.5px;
    height: 16px;
    background: #333;
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* -- content -- */
  .content {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
  }

  .intro {
    margin: -40px 0 56px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .intro h1 {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -1px;
    text-transform: uppercase;
    font-style: italic;
    transform: rotate(-2deg);
    margin-bottom: 10px;
  }

  .intro p {
    font-size: 13px;
    color: #999;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* -- scattered icons -- */
  .things {
    position: relative;
    max-width: 500px;
    margin: 0 auto 56px;
    height: 320px;
  }

  .thing {
    position: absolute;
    text-decoration: none;
    transition: transform 0.2s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .thing:hover {
    transform: scale(1.2);
  }

  .thing-icon {
    width: 72px;
    height: 72px;
    border-radius: 14px;
    object-fit: contain;
    background: #f5f5f5;
    padding: 8px;
  }

  .thing-emoji {
    width: 72px;
    height: 72px;
    border-radius: 14px;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .thing-label {
    font-size: 11px;
    font-weight: 600;
    color: #999;
    text-align: center;
    margin-top: 4px;
    letter-spacing: 0.3px;
  }

  /* -- footer -- */
  .footer {
    font-size: 13px;
  }

  .footer a {
    color: #999;
    text-decoration: none;
    border-bottom: 1px solid #ddd;
  }

  .footer a:hover {
    color: #1a1a1a;
    border-color: #1a1a1a;
  }

  /* -- responsive -- */
  @media (max-width: 500px) {
    .hero { max-height: 50vh; }
    .intro h1 { font-size: 28px; }
    .content { padding: 0 20px 60px; }

    .things {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      height: auto;
    }

    .thing {
      position: static !important;
    }

    .thing:hover {
      transform: scale(1.1);
    }
  }
</style>
</head>
<body>

  <div class="top-bar">

    "a doorbell is just a button that yells",
    "the distance between here and almost here",
  ];

  const el = document.getElementById('thought');
  let queue = [];

  function pick() {
    if (queue.length === 0) {
      queue = [...thoughts];
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }
    }
    return queue.pop();
  }

  async function type(text) {
    for (let i = 0; i <= text.length; i++) {
      el.textContent = text.slice(0, i);
      await new Promise(r => setTimeout(r, 45 + Math.random() * 40));
    }
    await new Promise(r => setTimeout(r, 1800));
    for (let i = text.length; i >= 0; i--) {
      el.textContent = text.slice(0, i);
      await new Promise(r => setTimeout(r, 25));
    }
    await new Promise(r => setTimeout(r, 400));
  }

  async function run() {
    while (true) { await type(pick()); }
  }

  run();

  // Parallax hero
  const heroImg = document.querySelector('.hero img');
  const hero = document.querySelector('.hero');
  window.addEventListener('scroll', () => {
    const rect = hero.getBoundingClientRect();
    if (rect.bottom > 0) {
      const speed = 0.4;
      heroImg.style.transform = `translateY(${window.scrollY * speed}px)`;
    }
  }, { passive: true });
